name: Hermes PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  hermes-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Trigger Hermes Review
        env:
          WEBHOOK_URL: ${{ secrets.HERMES_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.HERMES_WEBHOOK_SECRET }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_ACTION: ${{ github.event.action }}
          PR_USER: ${{ github.event.pull_request.user.login }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO_FULL_NAME: ${{ github.event.repository.full_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail

          if [ -z "$WEBHOOK_URL" ] || [ -z "$WEBHOOK_SECRET" ]; then
            echo "❌ HERMES_WEBHOOK_URL or HERMES_WEBHOOK_SECRET not set"
            exit 1
          fi

          # Construct the webhook payload as JSON
          PAYLOAD=$(jq -n \
            --arg action "$PR_ACTION" \
            --argjson number "$PR_NUMBER" \
            --arg title "$PR_TITLE" \
            --arg user "$PR_USER" \
            --arg sha "$PR_HEAD_SHA" \
            --arg repo "$REPO_FULL_NAME" \
            '{
              action: $action,
              pull_request: {
                number: $number,
                title: $title,
                user: { login: $user },
                head: { sha: $sha }
              },
              repository: {
                full_name: $repo
              }
            }')

          # Compute HMAC-SHA256 signature
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')

          # Send to Hermes webhook
          # Use --insecure: Tailscale Funnel's TLS may not be trusted by
          # GitHub Actions runners. HMAC signature provides authentication.
          echo "Triggering Hermes review for PR #$PR_NUMBER: $PR_TITLE"
          RESPONSE=$(curl -s -k --connect-timeout 15 -w "\n%{http_code}" -X POST \
            "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: pull_request" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" 2>&1)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Failed to trigger Hermes review"
            exit 1
          fi

          echo "✅ Hermes review triggered, waiting for review..."

      - name: Wait for Hermes Review
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO_FULL_NAME: ${{ github.event.repository.full_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail

          # Poll the PR reviews API for a review from Traderbot-Auto-Dev
          # Timeout after 10 minutes (40 iterations * 15s sleep)
          MAX_ATTEMPTS=40
          SLEEP_INTERVAL=15

          echo "Polling for Hermes PR review on PR #$PR_NUMBER..."
          echo "Looking for review from Traderbot-Auto-Dev on commit $PR_HEAD_SHA"

          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $i/$MAX_ATTEMPTS..."

            # Fetch reviews for this PR
            REVIEWS=$(gh api repos/$REPO_FULL_NAME/pulls/$PR_NUMBER/reviews 2>/dev/null)

            if [ -n "$REVIEWS" ] && [ "$REVIEWS" != "[]" ]; then
              # Find a review from Traderbot-Auto-Dev on this commit
              REVIEW_STATE=$(echo "$REVIEWS" | jq -r \
                --arg sha "$PR_HEAD_SHA" \
                '.[] | select(.user.login == "Traderbot-Auto-Dev" and .commit_id == $sha) | .state' \
                | tail -1)

              if [ -n "$REVIEW_STATE" ]; then
                echo "Found review: $REVIEW_STATE"

                case "$REVIEW_STATE" in
                  "APPROVED")
                    echo "✅ Hermes approved the PR"
                    exit 0
                    ;;
                  "CHANGES_REQUESTED")
                    echo "❌ Hermes requested changes on the PR"
                    # Print the review body for context
                    REVIEW_BODY=$(echo "$REVIEWS" | jq -r \
                      --arg sha "$PR_HEAD_SHA" \
                      '.[] | select(.user.login == "Traderbot-Auto-Dev" and .commit_id == $sha) | .body' \
                      | tail -1)
                    echo "Review: $REVIEW_BODY"
                    exit 1
                    ;;
                  "COMMENTED")
                    # A comment review is informational — check if there's a later APPROVED or CHANGES_REQUESTED
                    echo "Hermes posted a comment review (informational). Checking for later reviews..."
                    # Continue polling — a formal review may follow
                    ;;
                  *)
                    echo "Unknown review state: $REVIEW_STATE"
                    ;;
                esac
              fi
            fi

            sleep $SLEEP_INTERVAL
          done

          echo "❌ Timed out waiting for Hermes review (10 minutes)"
          echo "The review may still be processing. Check the PR comments manually."
          exit 1