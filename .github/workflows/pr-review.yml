name: Hermes PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  hermes-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Trigger Hermes Review
        env:
          WEBHOOK_URL: ${{ secrets.HERMES_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.HERMES_WEBHOOK_SECRET }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_ACTION: ${{ github.event.action }}
          PR_USER: ${{ github.event.pull_request.user.login }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO_FULL_NAME: ${{ github.event.repository.full_name }}
        run: |
          set -euo pipefail

          if [ -z "$WEBHOOK_URL" ] || [ -z "$WEBHOOK_SECRET" ]; then
            echo "❌ HERMES_WEBHOOK_URL or HERMES_WEBHOOK_SECRET not set"
            exit 1
          fi

          # Construct the webhook payload as JSON
          PAYLOAD=$(jq -n \
            --arg action "$PR_ACTION" \
            --argjson number "$PR_NUMBER" \
            --arg title "$PR_TITLE" \
            --arg user "$PR_USER" \
            --arg sha "$PR_HEAD_SHA" \
            --arg repo "$REPO_FULL_NAME" \
            '{
              action: $action,
              pull_request: {
                number: $number,
                title: $title,
                user: { login: $user },
                head: { sha: $sha }
              },
              repository: {
                full_name: $repo
              }
            }')

          # Compute HMAC-SHA256 signature
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')

          # Send to Hermes webhook
          echo "Triggering Hermes review for PR #$PR_NUMBER: $PR_TITLE"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: pull_request" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Hermes review triggered successfully"
          else
            echo "❌ Failed to trigger Hermes review"
            exit 1
          fi