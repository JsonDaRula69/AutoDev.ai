# Central documentation seeding sources.
#
# This file lives in ~/.AutoDev/config/docs-sources.yaml (central config, not project-local).
# AutoDev does NOT run seeding automatically on install. Uncomment sources you want to fetch,
# then run `autodev docs rebuild central` (or let `autodev doctor` first-run trigger it).
#
# Supported types:
#   git-sparse : shallow sparse checkout of a git repository path.
#   llms-txt   : parse an llms.txt index and fetch linked .md pages.
#   llms-full  : single aggregated docs file; file:// reads a local path, http(s):// fetches.
#
# `active: true` means the source is included when seeding is triggered and is checked for
# staleness more frequently (7 days). `active: false` is still seeded, but treated as
# lower-priority refresh (30 days).
#
# Deferred sources (non-Markdown formats) are listed at the bottom and must remain commented
# out until a format converter is built.

sources:
  - name: pi
    type: git-sparse
    url: https://github.com/earendil-works/pi
    sparsePath: packages/coding-agent/docs
    targetSubdir: pi
    active: true

